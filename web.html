<!DOCTYPE html>
<html>
<head>
  <title>My Simple Website</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: #f0f0f0;
    }

    h1 {
      color: #333;
    }

    button {
      padding: 10px 20px;
      background-color: blue;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: darkblue;
    }
  </style>
</head>

<body>

  <h1>Welcome 👋</h1>
  <p>website</p>

  <button onclick="showMessage()">Click Me</button>

  <script>
    function showMessage() {
      alert("Hello! You clicked the button 🎉");
    }
  </script>

</body>
</html>
